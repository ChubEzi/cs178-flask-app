<!DOCTYPE html>
<html lang="en">
<head>
    <title>Movie List</title>
    <!-- Bootstrap CSS for styling the table -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h2 class="mt-5">Movie List</h2>

        <table class="table table-bordered table-striped mt-3">
            <thead class="thead-dark">
                <tr>
                    <th>Movie ID</th>
                    <th>Movie Name</th>
                    <th>Genre</th>
                </tr>
            </thead>

            <tbody>
                {% for movie in users %}
                <tr>
                    <td>{{ movie.movie_id }}</td>  <!-- movie_id -->
                    <td>{{ movie.name }}</td>  <!-- movie name -->
                    <td>{{ movie.genre_name }}</td>  <!-- genre name (from JOIN) -->
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
